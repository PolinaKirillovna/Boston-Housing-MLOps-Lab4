version: "3.9"

services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: boston-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      # Kafka cluster ID is supplied from the Ansible Vault via scripts/load_secrets.py
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    ports:
      - "9092:9092"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 15s

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: boston-mssql
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/localhost/1433' || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  mssql-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boston-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./db/init:/init
    command: ["sh", "/init/run-init.sh"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boston-api
    depends_on:
      mssql-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      APP_ENV: dev
      MODEL_VERSION: "2.0.0"
      MSSQL_SERVER: mssql
      MSSQL_PORT: "1433"
      MSSQL_DATABASE: BostonHousingDB
      MSSQL_USER: sa
      MSSQL_DRIVER: ODBC Driver 18 for SQL Server
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: boston-predictions
      KAFKA_NUM_PARTITIONS: "3"
      # MSSQL_PASSWORD and JWT_SECRET_KEY are intentionally absent here:
      # the service decrypts them from secrets/secrets.yml at startup.
      # The vault password comes from this variable (CI/CD) or from the
      # mounted secrets/.vault_pass file (local development).
      ANSIBLE_VAULT_PASSWORD: ${ANSIBLE_VAULT_PASSWORD:-}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boston-consumer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: boston-predictions
      KAFKA_CONSUMER_GROUP: boston-consumer
    volumes:
      - .:/app
    command: ["python", "scripts/run_consumer.py"]
    restart: on-failure

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: boston-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: boston
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    restart: "no"

volumes:
  mssql_data:
