version: "3.9"

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: boston-mssql
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/localhost/1433' || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s

  mssql-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boston-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./db/init:/init
    command: >
      sh -c "/opt/mssql-tools18/bin/sqlcmd
      -S mssql,1433
      -U ${MSSQL_USER}
      -P ${MSSQL_PASSWORD}
      -C
      -i /init/init-db.sql"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: boston-api
    depends_on:
      mssql-init:
        condition: service_completed_successfully
    environment:
      APP_ENV: dev
      MODEL_VERSION: "2.0.0"
      MSSQL_SERVER: mssql
      MSSQL_PORT: "1433"
      MSSQL_DATABASE: BostonHousingDB
      MSSQL_USER: sa
      MSSQL_DRIVER: ODBC Driver 18 for SQL Server
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      # MSSQL_PASSWORD and JWT_SECRET_KEY are intentionally absent here:
      # the service decrypts them from secrets/secrets.yml at startup.
      # The vault password comes from this variable (CI/CD) or from the
      # mounted secrets/.vault_pass file (local development).
      ANSIBLE_VAULT_PASSWORD: ${ANSIBLE_VAULT_PASSWORD:-}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mssql_data:
