name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy-and-functional-test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      BASE_URL: http://127.0.0.1:8000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling for secrets and functional scenario
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core pyyaml requests

      - name: Render docker-compose .env from the Ansible Vault
        run: python scripts/load_secrets.py

      - name: Start services with docker compose
        run: docker compose up --build -d

      - name: Apply migrations
        run: docker compose exec -T api alembic upgrade head

      - name: Train model
        run: docker compose exec -T api python -m src.train

      - name: Run functional scenario
        run: python scripts/run_scenario.py

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose logs api
          docker compose logs mssql
          docker compose logs mssql-init

      - name: Tear down and remove plaintext secrets
        if: always()
        run: |
          docker compose down -v
          rm -f .env
